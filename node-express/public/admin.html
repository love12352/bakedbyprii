<!DOCTYPE html>
<html lang="en-GB">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bakedbyPrii · Orders</title>
    <meta name="robots" content="noindex">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Galada&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #fbcfe8; --accent-ink: #2a0d18;
            --glass-bg: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.12);
            --muted: rgba(255, 255, 255, 0.62);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif; color: #fff; min-height: 100vh;
            background: radial-gradient(circle at 30% 0%, #5e1f33 0%, #2a0d18 45%, #160a10 100%);
            padding: 1.5rem clamp(1rem, 4vw, 3rem) 4rem;
        }
        a { color: var(--accent); }

        /* Login */
        .gate { max-width: 380px; margin: 14vh auto 0; text-align: center; }
        .gate .logo { font-family: 'Galada', cursive; font-size: 2rem; margin-bottom: 0.3rem; }
        .gate p { color: var(--muted); margin-bottom: 1.5rem; font-size: 0.9rem; }
        .gate input {
            width: 100%; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--glass-border);
            border-radius: 12px; padding: 0.85rem 1rem; color: #fff; font-size: 0.95rem; margin-bottom: 0.8rem;
        }
        .gate input:focus { outline: none; border-color: var(--accent); }
        .btn {
            background: var(--accent); color: var(--accent-ink); border: none; border-radius: 100px;
            padding: 0.8rem 1.8rem; font-weight: 700; cursor: pointer; font-size: 0.9rem; font-family: inherit;
        }
        .btn:hover { transform: translateY(-1px); }
        .btn.ghost { background: transparent; color: #fff; border: 1px solid var(--glass-border); }
        .gate .err { color: #ffd2d2; font-size: 0.85rem; min-height: 1.2rem; margin-top: 0.4rem; }

        /* Dashboard */
        .topbar { display: flex; flex-wrap: wrap; gap: 1rem; align-items: center; justify-content: space-between; margin-bottom: 1.6rem; }
        .brand { display: flex; align-items: baseline; gap: 0.6rem; }
        .brand h1 { font-family: 'Galada', cursive; font-weight: 400; font-size: 1.7rem; }
        .brand span { color: var(--muted); font-size: 0.85rem; }
        .top-actions { display: flex; gap: 0.6rem; align-items: center; }

        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 1.8rem; }
        .stat { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 18px; padding: 1.1rem 1.3rem; }
        .stat .n { font-size: 1.9rem; font-weight: 700; }
        .stat .l { color: var(--muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.06em; }
        .stat.hot .n { color: var(--accent); }

        .filters { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.2rem; }
        .chip {
            background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--muted);
            border-radius: 100px; padding: 0.45rem 1rem; font-size: 0.82rem; cursor: pointer; font-family: inherit;
        }
        .chip.active { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); font-weight: 600; }

        .orders { display: grid; gap: 1rem; }
        .order {
            background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 18px; padding: 1.3rem;
            display: grid; grid-template-columns: 1.1fr 1.4fr 1fr auto; gap: 1.2rem; align-items: start;
        }
        .order.status-new { border-color: rgba(251, 207, 232, 0.45); }
        .order.status-cancelled { opacity: 0.55; }
        .order .ref { font-weight: 700; font-size: 1.05rem; }
        .order .when { color: var(--muted); font-size: 0.78rem; margin-top: 0.15rem; }
        .order .line { font-size: 0.85rem; margin: 0.15rem 0; }
        .order .line b { font-weight: 600; }
        .order .muted { color: var(--muted); }
        .order .items { font-size: 0.85rem; line-height: 1.5; }
        .order .tag { display: inline-block; background: rgba(255, 255, 255, 0.08); border-radius: 6px; padding: 0.1rem 0.45rem; font-size: 0.72rem; margin-right: 0.3rem; }
        .order .total { font-size: 1.3rem; font-weight: 700; }
        .order .right { text-align: right; display: flex; flex-direction: column; gap: 0.6rem; align-items: flex-end; }
        select.status {
            background: rgba(0, 0, 0, 0.3); color: #fff; border: 1px solid var(--glass-border);
            border-radius: 10px; padding: 0.5rem 0.7rem; font-size: 0.82rem; font-family: inherit; cursor: pointer;
        }
        .badge { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; padding: 0.2rem 0.55rem; border-radius: 6px; font-weight: 700; }
        .badge.new { background: var(--accent); color: var(--accent-ink); }
        .badge.confirmed { background: #cfe8d6; color: #143a22; }
        .badge.completed { background: rgba(255, 255, 255, 0.15); color: #fff; }
        .badge.cancelled { background: #e8cfcf; color: #3a1414; }

        .empty { text-align: center; color: var(--muted); padding: 4rem 1rem; }
        .hidden { display: none !important; }
        @media (max-width: 760px) { .order { grid-template-columns: 1fr; } .order .right { align-items: flex-start; text-align: left; } }
    </style>
</head>

<body>
    <!-- Login gate -->
    <div class="gate" id="gate">
        <div class="logo">bakedbyPrii</div>
        <p>Orders dashboard — please sign in.</p>
        <input id="key" type="password" placeholder="Admin key" autocomplete="current-password">
        <button class="btn" id="login" style="width:100%">Sign in</button>
        <div class="err" id="loginErr"></div>
    </div>

    <!-- Dashboard -->
    <div id="dash" class="hidden">
        <div class="topbar">
            <div class="brand"><h1>bakedbyPrii</h1><span>Orders dashboard</span></div>
            <div class="top-actions">
                <button class="btn ghost" id="refresh">↻ Refresh</button>
                <button class="btn ghost" id="logout">Sign out</button>
            </div>
        </div>

        <div class="stats">
            <div class="stat hot"><div class="n" id="s-new">0</div><div class="l">New orders</div></div>
            <div class="stat"><div class="n" id="s-total">0</div><div class="l">Total orders</div></div>
            <div class="stat"><div class="n" id="s-rev">£0</div><div class="l">Revenue (excl. cancelled)</div></div>
        </div>

        <div class="filters" id="filters">
            <button class="chip active" data-f="all">All</button>
            <button class="chip" data-f="new">New</button>
            <button class="chip" data-f="confirmed">Confirmed</button>
            <button class="chip" data-f="completed">Completed</button>
            <button class="chip" data-f="cancelled">Cancelled</button>
        </div>

        <div class="orders" id="orders"></div>
        <div class="empty hidden" id="empty">No orders here yet.</div>
    </div>

    <script>
        const $ = s => document.querySelector(s);
        const gbp = n => '£' + Number(n).toFixed(2);
        const STATUSES = ['new', 'confirmed', 'completed', 'cancelled'];
        let KEY = sessionStorage.getItem('bbp-admin-key') || '';
        let ALL = [];
        let filter = 'all';

        function esc(s) { return String(s ?? '').replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }

        async function api(path, opts = {}) {
            const res = await fetch(path, { ...opts, headers: { 'Content-Type': 'application/json', 'x-admin-key': KEY, ...(opts.headers || {}) } });
            if (res.status === 401) { signOut('Wrong admin key.'); throw new Error('unauth'); }
            return res.json();
        }

        function showDash(show) {
            $('#gate').classList.toggle('hidden', show);
            $('#dash').classList.toggle('hidden', !show);
        }
        function signOut(msg) {
            sessionStorage.removeItem('bbp-admin-key'); KEY = '';
            showDash(false); $('#loginErr').textContent = msg || ''; $('#key').value = '';
        }

        async function load() {
            try {
                const data = await api('/api/admin/orders');
                if (!data.ok) return;
                ALL = data.orders;
                $('#s-new').textContent = data.stats.new;
                $('#s-total').textContent = data.stats.total;
                $('#s-rev').textContent = gbp(data.stats.revenue);
                render();
            } catch (e) { /* handled in api() */ }
        }

        function render() {
            const list = filter === 'all' ? ALL : ALL.filter(o => o.status === filter);
            $('#empty').classList.toggle('hidden', list.length > 0);
            $('#orders').innerHTML = list.map(o => {
                const when = new Date(o.created_at).toLocaleString('en-GB', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
                const items = o.items.map(i => `<div>${i.qty} × ${esc(i.name)} <span class="muted">${gbp(i.price * i.qty)}</span></div>`).join('');
                const where = o.fulfilment === 'delivery'
                    ? `<b>Delivery</b><div class="muted">${esc(o.address)}, ${esc(o.postcode)}</div>`
                    : '<b>Collection</b><div class="muted">From home</div>';
                const opts = STATUSES.map(s => `<option value="${s}" ${s === o.status ? 'selected' : ''}>${s[0].toUpperCase() + s.slice(1)}</option>`).join('');
                return `<div class="order status-${o.status}">
                    <div>
                        <div class="ref">${esc(o.ref)} <span class="badge ${o.status}">${o.status}</span></div>
                        <div class="when">Placed ${when}</div>
                        <div class="line" style="margin-top:0.5rem">${where}</div>
                        <div class="line"><span class="tag">Wanted</span> ${esc(o.required_date)}</div>
                        <div class="line"><span class="tag">Pay</span> ${esc(o.payment)}</div>
                    </div>
                    <div>
                        <div class="line"><b>${esc(o.name)}</b></div>
                        <div class="line muted">${esc(o.email)}</div>
                        <div class="line muted">${esc(o.phone)}</div>
                        ${o.notes ? `<div class="line" style="margin-top:0.5rem"><span class="muted">Notes:</span> ${esc(o.notes)}</div>` : ''}
                    </div>
                    <div class="items">${items}
                        <div style="margin-top:0.4rem" class="muted">Subtotal ${gbp(o.subtotal)} · ${o.delivery_fee ? 'Delivery ' + gbp(o.delivery_fee) : 'Free delivery/collection'}</div>
                    </div>
                    <div class="right">
                        <div class="total">${gbp(o.total)}</div>
                        <select class="status" data-ref="${esc(o.ref)}">${opts}</select>
                    </div>
                </div>`;
            }).join('');

            document.querySelectorAll('select.status').forEach(sel => sel.addEventListener('change', async e => {
                const ref = e.target.dataset.ref, status = e.target.value;
                await api('/api/admin/orders/' + encodeURIComponent(ref), { method: 'PATCH', body: JSON.stringify({ status }) });
                load();
            }));
        }

        // Events
        $('#login').addEventListener('click', async () => {
            KEY = $('#key').value.trim();
            if (!KEY) { $('#loginErr').textContent = 'Enter your admin key.'; return; }
            const data = await fetch('/api/admin/orders', { headers: { 'x-admin-key': KEY } });
            if (data.status === 401) { $('#loginErr').textContent = 'Wrong admin key.'; return; }
            sessionStorage.setItem('bbp-admin-key', KEY);
            showDash(true); load();
        });
        $('#key').addEventListener('keydown', e => { if (e.key === 'Enter') $('#login').click(); });
        $('#refresh').addEventListener('click', load);
        $('#logout').addEventListener('click', () => signOut(''));
        document.querySelectorAll('.chip').forEach(c => c.addEventListener('click', () => {
            document.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
            c.classList.add('active'); filter = c.dataset.f; render();
        }));

        // Auto sign-in if we already have a key
        if (KEY) { showDash(true); load(); }
        setInterval(() => { if (KEY && !$('#dash').classList.contains('hidden')) load(); }, 30000);
    </script>
</body>

</html>
