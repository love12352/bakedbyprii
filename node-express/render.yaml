# Render Blueprint — deploys bakedbyPrii as a free web service.
# In Render: New + → Blueprint → pick this repo. Render reads this file.
services:
  - type: web
    name: bakedbyprii
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      # Node 22+ is required (the app uses node:sqlite).
      - key: NODE_VERSION
        value: "22"
      # Admin dashboard key for /admin — set your own secret value in Render.
      - key: ADMIN_KEY
        sync: false
      # Order emails: customer confirmations at each stage + order copies to you.
      # Easiest is a Gmail App Password. Fill these in Render to switch email on.
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: ORDER_NOTIFY_TO
        sync: false
      # Your live site URL — used to build the cancel link inside emails,
      # e.g. https://bakedbyprii.onrender.com
      - key: PUBLIC_URL
        sync: false
