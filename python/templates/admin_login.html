{# Admin sign-in. Posts the key to Flask, which stores it in the session. #}
{% extends "base.html" %}
{% block title %}Admin · bakedbyPrii{% endblock %}

{% block content %}
<section class="section" style="max-width:420px;margin:0 auto;text-align:center">
    <h2 class="section-title">Orders dashboard</h2>
    <p class="lead">Please sign in.</p>
    {% if error %}<div class="alert error">{{ error }}</div>{% endif %}
    <form method="post" action="{{ url_for('admin_login') }}">
        <input class="form" name="key" type="password" placeholder="Admin key" required
               style="display:block;width:100%;background:rgba(0,0,0,0.25);border:1px solid var(--glass-border);border-radius:12px;padding:0.8rem 1rem;color:#fff;margin-bottom:0.8rem">
        <button class="btn" type="submit" style="width:100%;justify-content:center">Sign in</button>
    </form>
</section>
{% endblock %}
